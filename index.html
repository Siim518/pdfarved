<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Arve Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input, textarea { display: block; margin-bottom: 10px; width: 300px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Arve Vorm</h1>
    <form id="invoiceForm">

        <label for="arve_nr">Arve nr:</label>
        <input type="text" id="arve_nr" name="arve_nr" autocomplete="off">

        <label for="saaja_nimi">Saaja nimi:</label>
        <input type="text" id="saaja_nimi" name="saaja_nimi" autocomplete="name">

        <label for="saaja_firma">Saaja firma:</label>
        <input type="text" id="saaja_firma" name="saaja_firma" autocomplete="organization">

        <label for="saaja_regnr">Saaja reg.nr:</label>
        <input type="text" id="saaja_regnr" name="saaja_regnr" autocomplete="off">

        <label for="saaja_kmkr">Saaja KMKR:</label>
        <input type="text" id="saaja_kmkr" name="saaja_kmkr" autocomplete="off">

        <label for="saaja_aadress">Saaja aadress:</label>
        <textarea id="saaja_aadress" name="saaja_aadress" rows="2" autocomplete="street-address"></textarea>

        <label for="products_text">Tooted (sisesta manuaalselt):</label>
        <textarea id="products_text" name="products_text" rows="6" autocomplete="off" required></textarea>

        <label for="email">Saaja e-mail:</label>
        <input type="email" id="email" name="email" autocomplete="email" required>

        <button type="submit">Saada arve PDF</button>
    </form>

    <p id="status"></p>

    <script>
        const form = document.getElementById('invoiceForm');
        const status = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            status.textContent = "Saadan arvet...";

            const data = {
                arve_nr: form.arve_nr.value || '',
                saaja_nimi: form.saaja_nimi.value || '',
                saaja_firma: form.saaja_firma.value || '',
                saaja_regnr: form.saaja_regnr.value || '',
                saaja_kmkr: form.saaja_kmkr.value || '',
                saaja_aadress: form.saaja_aadress.value || '',
                products_text: form.products_text.value.trim(),
                email: form.email.value.trim()
            };

            const response = await fetch('/.netlify/functions/create-invoice', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            if (response.ok) {
                status.textContent = "Arve saadetud ja arhiveeritud!";
                form.reset();
            } else {
                const err = await response.json();
                status.textContent = \"Viga: \" + err.error;
            }
        });
    </script>
</body>
</html>
