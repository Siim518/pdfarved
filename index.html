<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <title>Arve Generator - Dynamic Products</title>
  <style>
    /* Overall page background and centering */
    body {
      background-color: #f8e8d5;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center; /* center child elements by default */
    }

    /* Header area */
    header {
      margin-top: 20px;
      margin-bottom: 20px;
    }
    header img {
      width: 100px;
      height: auto;
      display: block;
      margin: 0 auto; /* center the logo */
    }
    header h1 {
      margin: 10px 0 0 0; /* small spacing above/below */
    }

    /* Container for the form */
    .container {
      background-color: #fff;
      max-width: 600px;
      margin: 0 auto 30px auto; /* center horizontally, add spacing at bottom */
      padding: 20px;
      border-radius: 8px;
      display: inline-block; /* so text-align: center from body still applies inside */
      text-align: left;      /* left-align the form fields and labels inside */
    }

    /* Form fields styling */
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      display: block;
      margin-bottom: 10px;
      width: 100%;
      max-width: 300px;
      padding: 6px;
      font-size: 14px;
    }

    /* Product group row spacing */
    .product-group {
      margin-bottom: 10px;
    }

    /* Buttons */
    button {
      background-color: #445e00;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }

    /* Status message */
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <!-- Make sure the file name exactly matches "benaks-logo.png" in the same folder as index.html -->
    <img src="benaks-logo.png" alt="Benaks Logo" />
    <h1>Arve Vorm (Dynamic Products)</h1>
  </header>

  <div class="container">
    <form id="invoiceForm">
      <label>Arve nr:</label>
      <input type="text" name="arve_nr" autocomplete="off" />

      <label>Saaja nimi:</label>
      <input type="text" name="saaja_nimi" autocomplete="name" />

      <label>Saaja firma:</label>
      <input type="text" name="saaja_firma" autocomplete="organization" />

      <label>Saaja reg.nr:</label>
      <input type="text" name="saaja_regnr" autocomplete="off" />

      <label>Saaja KMKR:</label>
      <input type="text" name="saaja_kmkr" autocomplete="off" />

      <label>Saaja aadress:</label>
      <textarea name="saaja_aadress" rows="2" autocomplete="street-address"></textarea>

      <h3>Tooted:</h3>
      <div id="products">
        <!-- Start with 1 row by default -->
        <div class="product-group">
          <input type="text" name="product_name" placeholder="Nimi" required />
          <input type="number" name="product_qty" placeholder="Kogus" required />
          <input type="number" step="0.01" name="product_price_gross" placeholder="Hind (koos KM)" required />
        </div>
      </div>
      <button type="button" onclick="addProduct()">Lisa toode</button>

      <h3>Saaja e-mail:</h3>
      <input type="email" name="email" autocomplete="email" required />

      <button type="submit">Saada arve PDF</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    function addProduct() {
      const div = document.createElement('div');
      div.classList.add('product-group');
      div.innerHTML = `
        <input type="text" name="product_name" placeholder="Nimi" required />
        <input type="number" name="product_qty" placeholder="Kogus" required />
        <input type="number" step="0.01" name="product_price_gross" placeholder="Hind (koos KM)" required />
      `;
      document.getElementById('products').appendChild(div);
    }

    const form = document.getElementById('invoiceForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = "Saadan arvet...";

      // Collect product rows
      const productGroups = document.querySelectorAll('.product-group');
      const products = [];
      productGroups.forEach(group => {
        const name = group.querySelector('input[name="product_name"]').value.trim();
        const qty = parseFloat(group.querySelector('input[name="product_qty"]').value);
        const priceGross = parseFloat(group.querySelector('input[name="product_price_gross"]').value);
        products.push({ name, qty, price_gross: priceGross });
      });

      const data = {
        arve_nr: form.arve_nr.value.trim(),
        saaja_nimi: form.saaja_nimi.value.trim(),
        saaja_firma: form.saaja_firma.value.trim(),
        saaja_regnr: form.saaja_regnr.value.trim(),
        saaja_kmkr: form.saaja_kmkr.value.trim(),
        saaja_aadress: form.saaja_aadress.value.trim(),
        email: form.email.value.trim(),
        products
      };

      const response = await fetch('/.netlify/functions/create-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        status.textContent = "Arve saadetud ja arhiveeritud!";
        form.reset();
        document.getElementById('products').innerHTML = '';
        addProduct(); // Re-add single empty row
      } else {
        const err = await response.json();
        status.textContent = "Viga: " + err.error;
      }
    });

    // Just in case user refreshes, ensure there's always 1 product row
    window.onload = () => {
      if (document.querySelectorAll('.product-group').length === 0) {
        addProduct();
      }
    };
  </script>

</body>
</html>
