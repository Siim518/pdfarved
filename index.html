<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <title>Arve generaator - Koeratoit.com + Arhiiv</title>
  <style>
    body {
      background-color: #f8e8d5;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      margin-top: 20px;
      margin-bottom: 20px;
    }
    header img {
      width: 100px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    header h1 {
      margin: 10px 0 0 0;
    }
    .container {
      background-color: #fff;
      width: 550px;
      margin: 20px auto 30px auto;
      padding: 20px;
      border-radius: 8px;
      text-align: left;
    }
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      display: block;
      margin-bottom: 10px;
      width: 100%;
      padding: 6px;
      font-size: 14px;
    }
    .product-group {
      margin-bottom: 10px;
    }
    button {
      background-color: #445e00;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
    /* Archive container */
    .archive-container {
      width: 550px;
      background-color: #fff;
      margin: 0 auto 30px auto;
      padding: 20px;
      border-radius: 8px;
      text-align: left;
    }
    .archive-list ul {
      list-style-type: none;
      padding-left: 0;
    }
    .archive-list li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <header>
    <!-- Make sure benaks-logo.png is in the same folder as index.html -->
    <img src="benaks-logo.png" alt="Benaks Logo" />
    <h1>Arve generaator - Koeratoit.com + Arhiiv</h1>
  </header>

  <!-- Main form container -->
  <div class="container">
    <form id="invoiceForm">
      <label>Arve nr:</label>
      <input type="text" name="arve_nr" autocomplete="off">

      <label>Saaja nimi:</label>
      <input type="text" name="saaja_nimi" autocomplete="name">

      <label>Saaja firma:</label>
      <input type="text" name="saaja_firma" autocomplete="organization">

      <label>Saaja reg.nr:</label>
      <input type="text" name="saaja_regnr" autocomplete="off">

      <label>Saaja KMKR:</label>
      <input type="text" name="saaja_kmkr" autocomplete="off">

      <label>Saaja aadress:</label>
      <textarea name="saaja_aadress" rows="2" autocomplete="street-address"></textarea>

      <h3>Tooted:</h3>
      <div id="products">
        <div class="product-group">
          <input type="text" name="product_name" placeholder="Nimi" required>
          <input type="number" name="product_qty" placeholder="Kogus" required>
          <input type="number" step="0.01" name="product_price_gross" placeholder="Hind (koos KM)" required>
        </div>
      </div>
      <button type="button" onclick="addProduct()">Lisa toode</button>

      <h3>Saaja e-mail:</h3>
      <input type="email" name="email" autocomplete="email" required>

      <button type="submit">Saada arve PDF</button>
    </form>

    <p id="status"></p>
  </div>

  <!-- Archive container below -->
  <div class="archive-container">
    <h2>Arhiiv</h2>
    <div id="archive" class="archive-list">Laen arhiivi...</div>
  </div>

  <script>
    function addProduct() {
      const div = document.createElement('div');
      div.classList.add('product-group');
      div.innerHTML = `
        <input type="text" name="product_name" placeholder="Nimi" required>
        <input type="number" name="product_qty" placeholder="Kogus" required>
        <input type="number" step="0.01" name="product_price_gross" placeholder="Hind (koos KM)" required>
      `;
      document.getElementById('products').appendChild(div);
    }

    // On page load, ensure we have 1 product row + load archive
    window.onload = () => {
      if (document.querySelectorAll('.product-group').length === 0) {
        addProduct();
      }
      loadArchives();
    };

    const form = document.getElementById('invoiceForm');
    const statusMsg = document.getElementById('status');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusMsg.textContent = "Saadan arvet...";

      // Collect product data
      const productGroups = document.querySelectorAll('.product-group');
      const products = [];
      productGroups.forEach(group => {
        const name = group.querySelector('input[name=\"product_name\"]').value.trim();
        const qty = parseFloat(group.querySelector('input[name=\"product_qty\"]').value);
        const priceGross = parseFloat(group.querySelector('input[name=\"product_price_gross\"]').value);
        products.push({ name, qty, price_gross: priceGross });
      });

      const data = {
        arve_nr: form.arve_nr.value.trim(),
        saaja_nimi: form.saaja_nimi.value.trim(),
        saaja_firma: form.saaja_firma.value.trim(),
        saaja_regnr: form.saaja_regnr.value.trim(),
        saaja_kmkr: form.saaja_kmkr.value.trim(),
        saaja_aadress: form.saaja_aadress.value.trim(),
        email: form.email.value.trim(),
        products
      };

      try {
        const response = await fetch('/.netlify/functions/create-invoice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error);
        }

        statusMsg.textContent = "Arve saadetud ja arhiveeritud!";
        form.reset();
        document.getElementById('products').innerHTML = '';
        addProduct(); // re-add empty row

        loadArchives(); // refresh archive after new invoice
      } catch (err) {
        statusMsg.textContent = "Viga: " + err.message;
      }
    });

    // Load archived PDFs from your Invoices folder
    async function loadArchives() {
      const archiveDiv = document.getElementById('archive');
      archiveDiv.textContent = 'Laen arhiivi...';
      try {
        const response = await fetch('/.netlify/functions/list-archives');
        if (!response.ok) {
          throw new Error('Could not load archives');
        }
        const files = await response.json();
        if (files.length === 0) {
          archiveDiv.textContent = 'Pole veel ühtegi arvet.';
          return;
        }

        let html = '<ul>';
        files.forEach(file => {
          html += `
            <li>
              <a href="${file.webViewLink}" target="_blank">${file.name}</a>
            </li>
          `;
        });
        html += '</ul>';

        archiveDiv.innerHTML = html;
      } catch (err) {
        archiveDiv.textContent = 'Viga arhiivi laadimisel: ' + err.message;
      }
    }
  </script>
</body>
</html>
